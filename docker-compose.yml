services:
  embedding-service:
    build:
      context: ./embedding-service
      dockerfile: Dockerfile
    container_name: embedding-service
    ports:
      - "${EMBEDDING_PORT}:${EMBEDDING_PORT}"
    environment:
      - EMBEDDING_MODEL=${EMBEDDING_MODEL}
      - EMBEDDING_PORT=${EMBEDDING_PORT}
    networks:
      - postgres-stack_default
      - building-code-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${EMBEDDING_PORT}/health"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - EMBEDDING_SERVICE_URL=http://embedding-service:${EMBEDDING_PORT}
      - BACKEND_PORT=${BACKEND_PORT}
      - OLLAMA_URL=${OLLAMA_URL}
      - OLLAMA_MODEL=${OLLAMA_MODEL}
      - LLM_PROVIDER=${LLM_PROVIDER}
      - SCRAPER_SERVICE_URL=http://scraper-service:8012
    depends_on:
      embedding-service:
        condition: service_healthy
    networks:
      - postgres-stack_default
      - building-code-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${BACKEND_PORT}/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  scraper-service:
    build:
      context: ./scraper-service
      dockerfile: Dockerfile
    container_name: scraper-service
    ports:
      - "8012:8012"
    networks:
      - building-code-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8012/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "${FRONTEND_PORT}:80"
    environment:
      - BACKEND_URL=http://backend:${BACKEND_PORT}
    depends_on:
      - backend
    networks:
      - building-code-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  postgres-stack_default:
    external: true
  building-code-network:
    driver: bridge
