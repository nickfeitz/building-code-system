server {
    listen 80;
    server_name _;

    # Code PDFs are big (CBC Part 2 Vol 1 is ~100 MB). Default nginx cap is 1M.
    # Hard cap at 1 GB to cover consolidated collections and future bundles.
    client_max_body_size 1G;
    client_body_timeout 600s;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static files
    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
    }

    # API proxy to backend.
    # The `^~` prefix forces this prefix location to take precedence over
    # the regex location below; otherwise URLs like
    # `/api/code-book-pdfs/3/pages/1.png` match the .png regex location
    # and try to serve from the static root (404).
    location ^~ /api/ {
        proxy_pass http://backend:8010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 75s;
        proxy_request_buffering off;   # stream large uploads straight through
    }

    # Cache control for static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/json;
}
