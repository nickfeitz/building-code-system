<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="hat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBBF77"/>
      <stop offset="1" stop-color="#F5A623"/>
    </linearGradient>
  </defs>
  <!-- Dome -->
  <path d="M12 30 C12 14 21 10 32 10 C43 10 52 14 52 30 Z" fill="url(#hat)"/>
  <!-- Ridges -->
  <g stroke="#B8730A" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.85">
    <line x1="23" y1="13" x2="23" y2="29"/>
    <line x1="32" y1="11" x2="32" y2="29"/>
    <line x1="41" y1="13" x2="41" y2="29"/>
  </g>
  <!-- Brim -->
  <path d="M8 30 h48 v3 a2 2 0 0 1 -2 2 h-44 a2 2 0 0 1 -2 -2 Z" fill="url(#hat)"/>

  <!-- Gear (white) -->
  <g transform="translate(32 50)" fill="white">
    <rect x="-2.5" y="-13" width="5" height="26" rx="1"/>
    <rect x="-2.5" y="-13" width="5" height="26" rx="1" transform="rotate(22.5)"/>
    <rect x="-2.5" y="-13" width="5" height="26" rx="1" transform="rotate(45)"/>
    <rect x="-2.5" y="-13" width="5" height="26" rx="1" transform="rotate(67.5)"/>
    <circle r="10"/>
  </g>
  <!-- Axle hole (hat-orange to tie the mark together) -->
  <circle cx="32" cy="50" r="3" fill="#F5A623"/>
</svg>
