<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Hard hat dome -->
  <path d="M14 32 C14 15 23 10 32 10 C41 10 50 15 50 32 Z" fill="#F5A623"/>
  <!-- Ridges -->
  <g stroke="#B8730A" stroke-width="1.6" stroke-linecap="round" fill="none">
    <line x1="23" y1="13" x2="23" y2="31"/>
    <line x1="32" y1="11" x2="32" y2="31"/>
    <line x1="41" y1="13" x2="41" y2="31"/>
  </g>
  <!-- Brim -->
  <path d="M8 32 h48 v3 a2 2 0 0 1 -2 2 h-44 a2 2 0 0 1 -2 -2 Z" fill="#F5A623"/>

  <!-- Gear (white) -->
  <g transform="translate(32 50)" fill="white">
    <rect x="-2.5" y="-13" width="5" height="26" rx="1"/>
    <rect x="-2.5" y="-13" width="5" height="26" rx="1" transform="rotate(22.5)"/>
    <rect x="-2.5" y="-13" width="5" height="26" rx="1" transform="rotate(45)"/>
    <rect x="-2.5" y="-13" width="5" height="26" rx="1" transform="rotate(67.5)"/>
    <circle r="10"/>
  </g>
  <!-- Axle hole -->
  <circle cx="32" cy="50" r="3" fill="#F5A623"/>
</svg>
